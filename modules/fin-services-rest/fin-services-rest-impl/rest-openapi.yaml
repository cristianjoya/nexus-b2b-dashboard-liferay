                    description: "Account created successfully"
            tags: ["Account"]
    "/accounts/{accountId}":
        delete:
            operationId: deleteAccount
            parameters:
                - in: path
                  name: accountId
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
                "204":
                    description: "Account deleted successfully"
            tags: ["Account"]
        get:
            operationId: getAccount
            parameters:
                - in: path
                  name: accountId
                  required: true
                  schema:
                      format: int64
                      type: integer
            responses:
