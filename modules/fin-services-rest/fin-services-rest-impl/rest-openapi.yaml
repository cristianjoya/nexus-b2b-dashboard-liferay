info:
    description: "FinServicesRest REST API"
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: "FinServicesRest"
    version: v1.0
openapi: 3.0.1
components:
    schemas:
        Account:
            description: "B2B financial account"
            properties:
                accountId:
                    format: int64
                    type: integer
                accountName:
                    type: string
                accountNumber:
                    type: string
                accountType:
                    type: string
                balance:
                    format: double
                    type: number
                createDate:
                    format: date-time
                    type: string
                modifiedDate:
                    format: date-time
                    type: string
                status:
                    format: int32
                    type: integer
                uuid:
                    type: string
                cardScheme:
                    type: string
                cardBrand:
                    type: string
                cardBankName:
                    type: string
                cardCountryName:
                    type: string
                ownerUserId:
                    format: int64
                    type: integer
                ownerUserName:
                    type: string
            type: object
        B2bAssignableUser:
            description: "B2B User that can own an account on the site"
            properties:
                emailAddress:
                    type: string
                fullName:
                    type: string
                userId:
                    format: int64
                    type: integer
            type: object
        CardBin:
            description: "BIN lookup enriched with external provider data"
            properties:
                bankName:
                    type: string
                bin:
                    type: string
                brand:
                    type: string
                countryCode:
                    type: string
                countryName:
                    type: string
                luhnValid:
                    type: boolean
                provider:
                    type: string
                scheme:
                    type: string
                type:
                    type: string
            type: object
        CreditApplication:
            description: "B2B credit application linked to an account"
            properties:
                accountId:
                    format: int64
                    type: integer
                applicantName:
                    type: string
                createDate:
                    format: date-time
                    type: string
                creditAppId:
                    format: int64
                    type: integer
                modifiedDate:
                    format: date-time
                    type: string
                purpose:
                    type: string
                requestedAmount:
                    format: double
                    type: number
                reviewNotes:
                    type: string
                status:
                    format: int32
                    type: integer
                uuid:
                    type: string
            type: object
        Transaction:
            description: "Financial transaction linked to an account"
            properties:
                accountId:
                    format: int64
                    type: integer
                amount:
                    format: double
                    type: number
                createDate:
                    format: date-time
                    type: string
                description:
                    type: string
                modifiedDate:
                    format: date-time
                    type: string
                status:
                    format: int32
                    type: integer
                transactionDate:
                    format: date-time
                    type: string
                transactionId:
                    format: int64
                    type: integer
                transactionType:
                    type: string
                uuid:
                    type: string
            type: object
paths:
    "/assignable-b2b-users":
        get:
            operationId: getAssignableB2BUsersPage
            parameters:
                - in: query
                  name: page
                  required: false
                  schema:
                      format: int32
                      type: integer
                - in: query
                  name: pageSize
                  required: false
                  schema:
                      format: int32
                      type: integer
                - in: query
                  name: search
                  required: false
                  schema:
                      type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: "#/components/schemas/B2bAssignableUser"
                                type: array
                        application/xml:
                            schema:
                                items:
                                    $ref: "#/components/schemas/B2bAssignableUser"
                                type: array
                    description: "Assignable B2B users retrieved successfully"
            tags: ["Account"]
    "/accounts":
